<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <style>
        /* CSS Reset and Basic Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Light gray background matching a child-friendly/clean design */
            background-color: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Login Box Styles */
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
        }

        .login-container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 24px;
            font-size: 28px;
            font-weight: 600;
        }

        /* Message Styles */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .error {
            color: #d9534f;
            background-color: #fdf7f7;
            border: 1px solid #ebccd1;
        }

        .success {
            color: #3c763d;
            background-color: #dff0d8;
            border: 1px solid #d6e9c6;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
            font-size: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            color: #2d3748;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15);
        }

        /* Button */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #3182ce;
            /* Primary Blue */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            margin-top: 10px;
            margin-bottom: 24px;
        }

        button[type="submit"]:hover {
            background-color: #2b6cb0;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Links */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: center;
        }

        .links a {
            color: #3182ce;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #2b6cb0;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Student Login</h2>

        <!-- Placeholder for messages -->
        <div id="status-message" class="message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Student ID / Username</label>
                <input type="text" id="username" placeholder="Enter your username">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="#">New Student? Register here</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const statusMessage = document.getElementById('status-message');

            form.addEventListener('submit', function (event) {
                event.preventDefault(); // Prevent default form submission

                // Reset message classes and hide
                statusMessage.className = 'message';
                statusMessage.style.display = 'none';

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // 1. Check if empty
                if (!username || !password) {
                    statusMessage.textContent = 'Both fields are required.';
                    statusMessage.classList.add('error');
                    statusMessage.style.display = 'block';
                    return;
                }

                // 2. Simple verification
                if (username === 'student123' && password === 'password123') {
                    statusMessage.textContent = 'Login successful! Welcome, Student.';
                    statusMessage.classList.add('success');
                    statusMessage.style.display = 'block';

                    // Clear the form fields upon successful login
                    form.reset();
                } else {
                    statusMessage.textContent = 'Invalid credentials. Please try again.';
                    statusMessage.classList.add('error');
                    statusMessage.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
